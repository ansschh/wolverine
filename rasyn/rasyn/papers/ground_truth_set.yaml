# Ground-truth set for paper extraction prompt validation (P-0.5 gate).
#
# 15 textbook rescue pairs covering all 4 v1 liability families. Each entry
# has been hand-curated with the rescue narrative + expected metric direction.
# Paper DOIs marked TODO are best-known references; the SMILES populator
# script will verify against CrossRef + PubMed and fill canonical_smiles via
# PubChem PUG REST + RDKit canonicalisation. NEVER hand-write SMILES (L25 +
# avoid silent corruption).
#
# Use:
#   1. Run extraction prompt on each paper's full text.
#   2. Compare LLM output to expected_pair fields.
#   3. Compute precision/recall over the 15 cases.
#   4. Iterate prompt until precision >= 95% before P-1 (real corpus).
#
# All compounds in this set MUST be checked against sealed-case decontamination
# (Tanimoto >= 0.85 vs terfenadine/fexofenadine/acyclovir/valacyclovir/
# OXS007570/OXS008474). validate_ground_truth_decontam.py runs this check.

