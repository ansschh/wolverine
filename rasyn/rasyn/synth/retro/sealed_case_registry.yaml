    description: >
      Literature-precedent recovery: oseltamivir (Tamiflu). Multi-step synthesis
      with multiple published industrial routes (shikimic-acid Roche route,
      Karpf/Trussardi 2001 route, Federspiel 1999 route). Tests whether the
      system rediscovers a known canonical route to a marketed drug. RETRO_PLAN §8.
    target_name: oseltamivir
    target_canonical_smiles: CCC(CC)OC1C=C(CC(N)C1NC(C)=O)C(=O)OCC
    target_inchi_key: VSZGPKBBMSAYNT-UHFFFAOYSA-N
    max_steps: 12
    must_terminate_in: commercially_available_building_blocks
    scale_hint: "10-100 mg"
    require_condition_prediction: true
    require_forward_validation: true
    hidden_solution:
      name: oseltamivir
      canonical_smiles: CCC(CC)OC1C=C(CC(N)C1NC(C)=O)C(=O)OCC
      inchi_key: VSZGPKBBMSAYNT-UHFFFAOYSA-N
      paper_doi: 10.1021/op0501390
      paper_pmid: null
      reference_route_step_count: 10
      reference_reaction_class_sequence:
        - protection_deprotection
        - sn2
        - sn_ar
        - amide_coupling
        - other_cross_coupling
        - protection_deprotection
      named_intermediates:
        - name: shikimic_acid
          canonical_smiles: OC1C=C(C(=O)O)CC(O)C1O
          inchi_key: JXOHGGNKMLTUBP-UHFFFAOYSA-N
        - name: shikimic_acid_ethyl_ester
          canonical_smiles: CCOC(=O)C1=CC(O)C(O)C(O)C1
          inchi_key: null
        - name: epoxide_intermediate
          canonical_smiles: null
          inchi_key: null
