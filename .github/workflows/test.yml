name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install (no chemistry stack — chemistry-free tests only)
        working-directory: ./rasyn
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run chemistry-free test suite
        working-directory: ./rasyn
        env:
          PYTHONPATH: .
        # Skip RDKit-dependent tests; the chemistry suite runs locally + on
        # the GPU box where RDKit + chembl_structure_pipeline are installed.
        run: |
          pytest tests/ \
            --ignore=tests/test_proposer_base.py \
            -q --maxfail=5
